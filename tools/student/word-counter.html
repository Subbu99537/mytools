<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter – MyTools</title>
  <meta name="description" content="Count words, characters, sentences, paragraphs and reading time for free.">
  <link rel="stylesheet" href="../../styles/main.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="tool-page">
    <div class="breadcrumb"><a href="../../index.html">Home</a> › <a href="index.html">Student Tools</a> › <span>Word Counter</span></div>
    <div class="tool-header">
      <h1>📝 Word Counter</h1>
      <p>Count words, characters, sentences, paragraphs and estimated reading time.</p>
    </div>

    <div class="tool-box">
      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label>Your Text</label>
          <button class="btn-copy" onclick="clearText()">Clear</button>
        </div>
        <textarea id="text-input" class="form-control" style="min-height:280px;font-size:1rem;line-height:1.7" placeholder="Start typing or paste your text here…" oninput="analyze()"></textarea>
      </div>
    </div>

    <!-- Stats Grid -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-top:20px" id="stats-grid">
      <div class="tool-box stat-card" style="margin:0;text-align:center;padding:20px">
        <div id="word-count" style="font-family:var(--font-display);font-size:2.2rem;font-weight:800;color:var(--accent)">0</div>
        <div style="font-size:0.8rem;color:var(--text-2);margin-top:4px">Words</div>
      </div>
      <div class="tool-box stat-card" style="margin:0;text-align:center;padding:20px">
        <div id="char-count" style="font-family:var(--font-display);font-size:2.2rem;font-weight:800;color:var(--green)">0</div>
        <div style="font-size:0.8rem;color:var(--text-2);margin-top:4px">Characters</div>
      </div>
      <div class="tool-box stat-card" style="margin:0;text-align:center;padding:20px">
        <div id="char-no-space" style="font-family:var(--font-display);font-size:2.2rem;font-weight:800;color:var(--orange)">0</div>
        <div style="font-size:0.8rem;color:var(--text-2);margin-top:4px">Chars (no spaces)</div>
      </div>
      <div class="tool-box stat-card" style="margin:0;text-align:center;padding:20px">
        <div id="sentence-count" style="font-family:var(--font-display);font-size:2.2rem;font-weight:800;color:var(--pink)">0</div>
        <div style="font-size:0.8rem;color:var(--text-2);margin-top:4px">Sentences</div>
      </div>
      <div class="tool-box stat-card" style="margin:0;text-align:center;padding:20px">
        <div id="para-count" style="font-family:var(--font-display);font-size:2.2rem;font-weight:800;color:var(--yellow)">0</div>
        <div style="font-size:0.8rem;color:var(--text-2);margin-top:4px">Paragraphs</div>
      </div>
      <div class="tool-box stat-card" style="margin:0;text-align:center;padding:20px">
        <div id="read-time" style="font-family:var(--font-display);font-size:2.2rem;font-weight:800;color:var(--accent-3)">0m</div>
        <div style="font-size:0.8rem;color:var(--text-2);margin-top:4px">Read Time</div>
      </div>
    </div>

    <!-- Top Words -->
    <div class="tool-box" style="margin-top:20px">
      <h3 style="font-size:0.9rem;font-weight:600;margin-bottom:12px">Top Words</h3>
      <div id="top-words" style="display:flex;flex-wrap:wrap;gap:8px">
        <span style="color:var(--text-3);font-size:0.85rem">Start typing to see word frequency…</span>
      </div>
    </div>
  </div>
  <div id="footer-placeholder"></div>

  <script src="../../scripts/components.js"></script>
  <script src="../../scripts/main.js"></script>
  <script>
    const STOP_WORDS = new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','by','from','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','this','that','these','those','it','its','i','you','he','she','we','they','me','him','her','us','them']);

    function analyze() {
      const text = document.getElementById('text-input').value;
      const words = text.trim() ? text.trim().split(/\s+/).filter(w => w.length > 0) : [];
      const sentences = text.trim() ? text.split(/[.!?]+/).filter(s => s.trim().length > 0) : [];
      const paragraphs = text.trim() ? text.split(/\n\s*\n/).filter(p => p.trim().length > 0) : [];
      const noSpaces = text.replace(/\s/g, '');
      const readMins = Math.max(0, Math.ceil(words.length / 200));

      document.getElementById('word-count').textContent = words.length;
      document.getElementById('char-count').textContent = text.length;
      document.getElementById('char-no-space').textContent = noSpaces.length;
      document.getElementById('sentence-count').textContent = sentences.length;
      document.getElementById('para-count').textContent = paragraphs.length;
      document.getElementById('read-time').textContent = readMins < 1 ? '<1m' : readMins + 'm';

      // Word frequency
      const freq = {};
      words.forEach(w => {
        const clean = w.toLowerCase().replace(/[^a-z]/g, '');
        if (clean.length > 2 && !STOP_WORDS.has(clean)) freq[clean] = (freq[clean] || 0) + 1;
      });
      const top = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 15);
      document.getElementById('top-words').innerHTML = top.length
        ? top.map(([w, c]) => `<span style="background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:0.8rem"><strong style="color:var(--accent-3)">${c}×</strong> ${w}</span>`).join('')
        : '<span style="color:var(--text-3);font-size:0.85rem">No significant words yet…</span>';
    }

    function clearText() {
      document.getElementById('text-input').value = '';
      analyze();
    }
  </script>
</body>
</html>
