<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split PDF – MyTools</title>
  <meta name="description" content="Split a PDF into individual pages or custom page ranges for free.">
  <link rel="stylesheet" href="../../styles/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="tool-page">
    <div class="breadcrumb">
      <a href="../../index.html">Home</a> ›
      <a href="index.html">PDF Tools</a> ›
      <span>Split PDF</span>
    </div>
    <div class="tool-header">
      <h1>✂️ Split PDF</h1>
      <p>Extract specific pages or split a PDF into individual pages.</p>
    </div>

    <div class="tool-box">
      <div class="upload-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf,application/pdf">
        <div class="upload-icon">📄</div>
        <h3>Drop your PDF here</h3>
        <p>PDF files supported</p>
        <button type="button" class="btn-primary" style="margin-top:14px;padding:10px 24px" 
          onclick="event.stopPropagation();document.getElementById('file-input').click()">
          📂 Choose File
        </button>
      </div>
        <h3>Drop your PDF here or click to browse</h3>
        <p>PDF files supported</p>
      </div>
      <div style="text-align:center;margin-top:8px">
        <button class="btn-secondary" onclick="document.getElementById('file-input').click()" style="font-size:0.85rem;padding:8px 20px">📂 Browse Files</button>
      </div>

      <div id="pdf-info" style="display:none;margin-top:16px">
        <div class="form-group">
          <label>Split Mode</label>
          <div class="options-row">
            <button class="option-btn active" onclick="setMode('all', this)">All Pages (separate files)</button>
            <button class="option-btn" onclick="setMode('range', this)">Page Range</button>
          </div>
        </div>
        <div id="range-input" style="display:none" class="form-group">
          <label>Page Range (e.g., 1-3,5,7-9)</label>
          <input type="text" id="page-range" class="form-control" placeholder="1-3,5,7-9">
          <p style="font-size:0.78rem;color:var(--text-3);margin-top:4px">Enter page numbers separated by commas. Use hyphen for ranges.</p>
        </div>
        <p id="page-count-label" style="font-size:0.875rem;color:var(--text-2);margin-bottom:12px"></p>
      </div>

      <div id="progress-wrap" class="progress-wrap"><div class="progress-bar"></div></div>

      <button class="btn-primary w-full" style="margin-top:16px;justify-content:center;padding:14px" onclick="splitPDF()">
        ✂️ Split PDF
      </button>
    </div>

    <div id="output" class="output-box">
      <div class="output-header">
        <h3>✅ Split Complete</h3>
        <div class="output-actions">
          <button class="btn-download" onclick="downloadZip()">⬇ Download All as ZIP</button>
        </div>
      </div>
      <p id="split-info" style="font-size:0.8rem;color:var(--text-3);font-family:var(--font-mono)"></p>
    </div>
  </div>
  <div id="footer-placeholder"></div>

  <script src="../../scripts/components.js"></script>
  <script src="../../scripts/main.js"></script>
  <script>
    let pdfFile = null, totalPages = 0, splitMode = 'all', splitParts = [];

    function setMode(mode, btn) {
      splitMode = mode;
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('range-input').style.display = mode === 'range' ? 'block' : 'none';
    }

    document.getElementById('file-input').addEventListener('change', async function() { const e = {target: this};
      pdfFile = e.target.files[0];
      if (!pdfFile) return;
      const ab = await pdfFile.arrayBuffer();
      const { PDFDocument } = PDFLib;
      const doc = await PDFDocument.load(ab);
      totalPages = doc.getPageCount();
      document.getElementById('pdf-info').style.display = 'block';
      document.getElementById('page-count-label').textContent = `PDF has ${totalPages} pages`;
    });

    initDropZone('drop-zone', files => {
      if (files[0]) { document.getElementById('file-input').files; pdfFile = files[0]; }
    });

    function parseRange(str, max) {
      const pages = new Set();
      str.split(',').forEach(part => {
        const range = part.trim().split('-');
        if (range.length === 2) {
          const a = parseInt(range[0]), b = parseInt(range[1]);
          for (let i = a; i <= b && i <= max; i++) if (i >= 1) pages.add(i);
        } else {
          const n = parseInt(part.trim());
          if (!isNaN(n) && n >= 1 && n <= max) pages.add(n);
        }
      });
      return [...pages].sort((a, b) => a - b);
    }

    async function splitPDF() {
      if (!pdfFile) { showToast('Please select a PDF file', 'error'); return; }
      showProgress('progress-wrap');
      splitParts = [];

      try {
        const { PDFDocument } = PDFLib;
        const ab = await pdfFile.arrayBuffer();
        const src = await PDFDocument.load(ab);
        totalPages = src.getPageCount();

        let pageNums = splitMode === 'range'
          ? parseRange(document.getElementById('page-range').value, totalPages)
          : Array.from({ length: totalPages }, (_, i) => i + 1);

        if (!pageNums.length) { showToast('No valid pages found', 'error'); hideProgress('progress-wrap'); return; }

        for (let idx = 0; idx < pageNums.length; idx++) {
          setProgress('progress-wrap', (idx / pageNums.length) * 100);
          const newDoc = await PDFDocument.create();
          const [page] = await newDoc.copyPages(src, [pageNums[idx] - 1]);
          newDoc.addPage(page);
          const bytes = await newDoc.save();
          splitParts.push({ name: `page-${pageNums[idx]}.pdf`, bytes });
        }

        setProgress('progress-wrap', 100);
        document.getElementById('split-info').textContent = `${splitParts.length} files generated`;
        document.getElementById('output').classList.add('visible');
        showToast(`Split into ${splitParts.length} files!`);
        trackEvent('PDF Tools', 'split', 'split-pdf');
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
      hideProgress('progress-wrap');
    }

    async function downloadZip() {
      const zip = new JSZip();
      splitParts.forEach(p => zip.file(p.name, p.bytes));
      const blob = await zip.generateAsync({ type: 'blob' });
      downloadBlob(blob, 'split-pages.zip');
    }
  </script>
</body>
</html>
