<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timestamp Converter – MyTools</title>
  <meta name="description" content="Convert Unix timestamps to human-readable dates and vice versa.">
  <link rel="stylesheet" href="../../styles/main.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="tool-page">
    <div class="breadcrumb"><a href="../../index.html">Home</a> › <a href="index.html">Developer Tools</a> › <span>Timestamp Converter</span></div>
    <div class="tool-header">
      <h1>⏱️ Timestamp Converter</h1>
      <p>Convert Unix timestamps to human-readable dates, or dates to timestamps.</p>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <!-- Unix → Date -->
      <div class="tool-box" style="margin:0">
        <h3 style="font-family:var(--font-display);font-size:1rem;font-weight:700;margin-bottom:16px">Unix Timestamp → Date</h3>
        <div class="form-group">
          <label>Unix Timestamp</label>
          <div style="display:flex;gap:8px">
            <input type="number" id="unix-input" class="form-control" placeholder="e.g. 1700000000">
            <button class="btn-secondary" onclick="useNow()">Now</button>
          </div>
        </div>
        <div class="form-group">
          <label>Unit</label>
          <div class="options-row">
            <button class="option-btn active" data-unit="s" onclick="setUnit(this)">Seconds</button>
            <button class="option-btn" data-unit="ms" onclick="setUnit(this)">Milliseconds</button>
          </div>
        </div>
        <button class="btn-primary w-full" style="justify-content:center;padding:12px" onclick="unixToDate()">Convert →</button>
        <div id="date-result" style="display:none;margin-top:16px">
          <div style="display:flex;flex-direction:column;gap:8px" id="date-rows"></div>
        </div>
      </div>

      <!-- Date → Unix -->
      <div class="tool-box" style="margin:0">
        <h3 style="font-family:var(--font-display);font-size:1rem;font-weight:700;margin-bottom:16px">Date → Unix Timestamp</h3>
        <div class="form-group">
          <label>Date & Time</label>
          <input type="datetime-local" id="date-input" class="form-control">
        </div>
        <button class="btn-primary w-full" style="justify-content:center;padding:12px;margin-top:8px" onclick="dateToUnix()">Convert →</button>
        <div id="unix-result" style="display:none;margin-top:16px">
          <div style="display:flex;flex-direction:column;gap:8px" id="unix-rows"></div>
        </div>
      </div>
    </div>

    <!-- Current Time Live -->
    <div class="tool-box" style="margin-top:20px;text-align:center">
      <h3 style="font-size:0.875rem;color:var(--text-3);font-weight:500;margin-bottom:8px">CURRENT TIME</h3>
      <div id="live-unix" style="font-family:var(--font-mono);font-size:2rem;font-weight:500;color:var(--accent-3)"></div>
      <div id="live-date" style="color:var(--text-2);font-size:0.9rem;margin-top:4px"></div>
    </div>
  </div>
  <div id="footer-placeholder"></div>

  <script src="../../scripts/components.js"></script>
  <script src="../../scripts/main.js"></script>
  <script>
    let unit = 's';
    function setUnit(btn) {
      document.querySelectorAll('[data-unit]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      unit = btn.dataset.unit;
    }

    function useNow() {
      document.getElementById('unix-input').value = unit === 'ms' ? Date.now() : Math.floor(Date.now() / 1000);
    }

    function resultRow(label, value, canCopy = true) {
      return `
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 14px">
          <div>
            <div style="font-size:0.72rem;color:var(--text-3);margin-bottom:2px">${label}</div>
            <div style="font-family:var(--font-mono);font-size:0.85rem;color:var(--accent-3)">${value}</div>
          </div>
          ${canCopy ? `<button onclick="copyToClipboard('${value.replace(/'/g,"\\'")}')\" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:0.8rem">📋</button>` : ''}
        </div>`;
    }

    function unixToDate() {
      const raw = document.getElementById('unix-input').value;
      if (!raw) { showToast('Enter a timestamp', 'error'); return; }
      const ms = unit === 'ms' ? parseInt(raw) : parseInt(raw) * 1000;
      const d = new Date(ms);
      if (isNaN(d)) { showToast('Invalid timestamp', 'error'); return; }

      document.getElementById('date-rows').innerHTML = [
        resultRow('Local Date & Time', d.toLocaleString()),
        resultRow('UTC', d.toUTCString()),
        resultRow('ISO 8601', d.toISOString()),
        resultRow('Relative', getRelative(d)),
      ].join('');
      document.getElementById('date-result').style.display = 'block';
      trackEvent('Developer Tools', 'convert', 'timestamp');
    }

    function dateToUnix() {
      const val = document.getElementById('date-input').value;
      if (!val) { showToast('Pick a date', 'error'); return; }
      const d = new Date(val);
      const s = Math.floor(d.getTime() / 1000);
      document.getElementById('unix-rows').innerHTML = [
        resultRow('Unix (seconds)', String(s)),
        resultRow('Unix (milliseconds)', String(d.getTime())),
        resultRow('ISO 8601', d.toISOString()),
      ].join('');
      document.getElementById('unix-result').style.display = 'block';
    }

    function getRelative(d) {
      const diff = (Date.now() - d.getTime()) / 1000;
      if (Math.abs(diff) < 60) return 'Just now';
      if (Math.abs(diff) < 3600) return `${Math.round(diff/60)} minutes ${diff>0?'ago':'from now'}`;
      if (Math.abs(diff) < 86400) return `${Math.round(diff/3600)} hours ${diff>0?'ago':'from now'}`;
      return `${Math.round(diff/86400)} days ${diff>0?'ago':'from now'}`;
    }

    // Live clock
    function updateLive() {
      const now = new Date();
      document.getElementById('live-unix').textContent = Math.floor(now.getTime() / 1000);
      document.getElementById('live-date').textContent = now.toLocaleString();
    }
    updateLive();
    setInterval(updateLive, 1000);

    // Set date-input to now
    const now = new Date();
    const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
    document.getElementById('date-input').value = local.toISOString().slice(0, 16);
  </script>
</body>
</html>
