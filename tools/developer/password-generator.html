<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator – MyTools</title>
  <meta name="description" content="Generate strong, secure random passwords instantly for free.">
  <link rel="stylesheet" href="../../styles/main.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="tool-page">
    <div class="breadcrumb"><a href="../../index.html">Home</a> › <a href="index.html">Developer Tools</a> › <span>Password Generator</span></div>
    <div class="tool-header">
      <h1>🔑 Password Generator</h1>
      <p>Generate cryptographically secure random passwords with custom rules.</p>
    </div>

    <div class="tool-box">
      <!-- Main output -->
      <div style="background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;position:relative">
        <div id="password-display" style="font-family:var(--font-mono);font-size:1.4rem;font-weight:500;color:var(--text);word-break:break-all;padding-right:80px;min-height:2rem"></div>
        <div style="position:absolute;top:50%;right:16px;transform:translateY(-50%);display:flex;gap:6px">
          <button class="btn-icon" onclick="generate()" title="Regenerate">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          </button>
          <button class="btn-icon" onclick="copyPassword()" title="Copy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>

      <!-- Strength -->
      <div style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:6px">
          <span style="color:var(--text-2)">Strength</span>
          <span id="strength-label" style="font-weight:600"></span>
        </div>
        <div class="strength-bar">
          <div class="strength-segment" id="s1"></div>
          <div class="strength-segment" id="s2"></div>
          <div class="strength-segment" id="s3"></div>
          <div class="strength-segment" id="s4"></div>
        </div>
      </div>

      <!-- Length -->
      <div class="form-group">
        <label>Password Length: <strong id="length-label">16</strong> characters</label>
        <input type="range" id="length" min="6" max="64" value="16" oninput="document.getElementById('length-label').textContent=this.value;generate()">
      </div>

      <!-- Character sets -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <label class="checkbox-group" style="background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 14px">
          <input type="checkbox" id="uppercase" checked onchange="generate()">
          <div>
            <div style="font-size:0.875rem;font-weight:500">Uppercase</div>
            <div style="font-size:0.75rem;color:var(--text-3);font-family:var(--font-mono)">A–Z</div>
          </div>
        </label>
        <label class="checkbox-group" style="background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 14px">
          <input type="checkbox" id="lowercase" checked onchange="generate()">
          <div>
            <div style="font-size:0.875rem;font-weight:500">Lowercase</div>
            <div style="font-size:0.75rem;color:var(--text-3);font-family:var(--font-mono)">a–z</div>
          </div>
        </label>
        <label class="checkbox-group" style="background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 14px">
          <input type="checkbox" id="numbers" checked onchange="generate()">
          <div>
            <div style="font-size:0.875rem;font-weight:500">Numbers</div>
            <div style="font-size:0.75rem;color:var(--text-3);font-family:var(--font-mono)">0–9</div>
          </div>
        </label>
        <label class="checkbox-group" style="background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 14px">
          <input type="checkbox" id="symbols" checked onchange="generate()">
          <div>
            <div style="font-size:0.875rem;font-weight:500">Symbols</div>
            <div style="font-size:0.75rem;color:var(--text-3);font-family:var(--font-mono)">!@#$%…</div>
          </div>
        </label>
      </div>

      <div class="form-group">
        <label class="checkbox-group">
          <input type="checkbox" id="exclude-ambiguous" onchange="generate()">
          <div>
            <div style="font-size:0.875rem;font-weight:500">Exclude ambiguous characters</div>
            <div style="font-size:0.75rem;color:var(--text-3);font-family:var(--font-mono)">Removes 0, O, l, 1, I</div>
          </div>
        </label>
      </div>

      <button class="btn-primary w-full" style="justify-content:center;padding:14px" onclick="generate()">🔄 Regenerate</button>

      <!-- Bulk -->
      <hr class="divider">
      <h3 style="font-size:0.9rem;font-weight:600;margin-bottom:12px">Bulk Generate</h3>
      <div style="display:flex;gap:10px">
        <select id="bulk-count" class="form-control" style="max-width:140px">
          <option value="5">5 passwords</option>
          <option value="10">10 passwords</option>
          <option value="20">20 passwords</option>
        </select>
        <button class="btn-secondary" onclick="generateBulk()">Generate</button>
        <button class="btn-copy" onclick="copyToClipboard(document.getElementById('bulk-output').textContent)">📋 Copy All</button>
      </div>
      <div class="code-output" id="bulk-output" style="margin-top:10px;min-height:40px;display:none"></div>
    </div>
  </div>
  <div id="footer-placeholder"></div>

  <script src="../../scripts/components.js"></script>
  <script src="../../scripts/main.js"></script>
  <script>
    const CHARS = {
      uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lowercase: 'abcdefghijklmnopqrstuvwxyz',
      numbers: '0123456789',
      symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    };
    const AMBIGUOUS = /[0OlI1]/g;

    function getCharset() {
      let chars = '';
      if (document.getElementById('uppercase').checked) chars += CHARS.uppercase;
      if (document.getElementById('lowercase').checked) chars += CHARS.lowercase;
      if (document.getElementById('numbers').checked) chars += CHARS.numbers;
      if (document.getElementById('symbols').checked) chars += CHARS.symbols;
      if (document.getElementById('exclude-ambiguous').checked) chars = chars.replace(AMBIGUOUS, '');
      return chars;
    }

    function secureRandom(max) {
      const arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      return arr[0] % max;
    }

    function makePassword(length, chars) {
      if (!chars) return '';
      return Array.from({ length }, () => chars[secureRandom(chars.length)]).join('');
    }

    function generate() {
      const length = parseInt(document.getElementById('length').value);
      const chars = getCharset();
      if (!chars) { showToast('Select at least one character type', 'error'); return; }
      const pwd = makePassword(length, chars);
      document.getElementById('password-display').textContent = pwd;
      updateStrength(pwd, chars);
      trackEvent('Developer Tools', 'generate', 'password-generator');
    }

    function updateStrength(pwd, chars) {
      let score = 0;
      if (pwd.length >= 12) score++;
      if (pwd.length >= 16) score++;
      if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      score = Math.min(4, Math.ceil(score * 0.8));

      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const colors = ['', 'weak', 'medium', 'medium', 'strong'];
      document.getElementById('strength-label').textContent = labels[score];
      document.getElementById('strength-label').style.color = score <= 1 ? 'var(--pink)' : score <= 2 ? 'var(--yellow)' : 'var(--green)';
      for (let i = 1; i <= 4; i++) {
        const el = document.getElementById(`s${i}`);
        el.className = 'strength-segment' + (i <= score ? ` ${colors[score]}` : '');
      }
    }

    function copyPassword() {
      const pwd = document.getElementById('password-display').textContent;
      if (pwd) copyToClipboard(pwd);
    }

    function generateBulk() {
      const count = parseInt(document.getElementById('bulk-count').value);
      const length = parseInt(document.getElementById('length').value);
      const chars = getCharset();
      if (!chars) { showToast('Select at least one character type', 'error'); return; }
      const pwds = Array.from({ length: count }, () => makePassword(length, chars));
      const out = document.getElementById('bulk-output');
      out.textContent = pwds.join('\n');
      out.style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', generate);
  </script>
</body>
</html>
