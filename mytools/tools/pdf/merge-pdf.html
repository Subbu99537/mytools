<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merge PDF – MyTools</title>
  <meta name="description" content="Merge multiple PDF files into one document for free. Drag to reorder pages.">
  <link rel="stylesheet" href="../../styles/main.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="tool-page">
    <div class="breadcrumb">
      <a href="../../index.html">Home</a> ›
      <a href="index.html">PDF Tools</a> ›
      <span>Merge PDF</span>
    </div>
    <div class="tool-header">
      <h1>🔗 Merge PDF</h1>
      <p>Combine multiple PDF files into a single document. Drag to reorder before merging.</p>
    </div>
    <div class="ad-slot ad-slot-banner"><!-- Ad --></div>

    <div class="tool-box" style="margin-top:24px">
      <div class="upload-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf,application/pdf" multiple>
        <div class="upload-icon">📎</div>
        <h3>Drop PDF files here or click to browse</h3>
        <p>Upload 2 or more PDFs · <em>Drag to reorder</em></p>
      </div>

      <div id="file-list" class="file-list" style="margin-top:16px"></div>
      <div id="progress-wrap" class="progress-wrap"><div class="progress-bar"></div></div>

      <button class="btn-primary w-full" style="margin-top:16px;justify-content:center;padding:14px" onclick="mergePDFs()">
        🔗 Merge PDFs
      </button>
    </div>

    <div id="output" class="output-box">
      <div class="output-header">
        <h3>✅ Merged PDF Ready</h3>
        <div class="output-actions">
          <button class="btn-download" onclick="downloadMerged()">⬇ Download PDF</button>
        </div>
      </div>
      <p id="merge-info" style="font-size:0.8rem;color:var(--text-3);font-family:var(--font-mono)"></p>
    </div>
  </div>
  <div id="footer-placeholder"></div>

  <script src="../../scripts/components.js"></script>
  <script src="../../scripts/main.js"></script>
  <script>
    let files = [];
    let mergedBytes = null;

    initDropZone('drop-zone', newFiles => {
      files = [...files, ...newFiles.filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'))];
      renderList();
    });

    function renderList() {
      const el = document.getElementById('file-list');
      el.innerHTML = files.map((f, i) => `
        <div class="file-item" draggable="true" data-index="${i}" ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="drop(event,${i})">
          <span>⠿</span>
          <span style="font-size:1rem">📄</span>
          <span class="file-name">${f.name}</span>
          <span class="file-size">${formatBytes(f.size)}</span>
          <button class="file-remove" onclick="removeFile(${i})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      `).join('');
    }

    function removeFile(i) { files.splice(i, 1); renderList(); }

    let dragIdx = null;
    function dragStart(e, i) { dragIdx = i; e.dataTransfer.effectAllowed = 'move'; }
    function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function drop(e, i) {
      e.preventDefault();
      if (dragIdx === null || dragIdx === i) return;
      const moved = files.splice(dragIdx, 1)[0];
      files.splice(i, 0, moved);
      dragIdx = null;
      renderList();
    }

    async function mergePDFs() {
      if (files.length < 2) { showToast('Please add at least 2 PDF files', 'error'); return; }
      showProgress('progress-wrap');
      try {
        const { PDFDocument } = PDFLib;
        const merged = await PDFDocument.create();
        let totalPages = 0;

        for (let i = 0; i < files.length; i++) {
          setProgress('progress-wrap', (i / files.length) * 90);
          const ab = await files[i].arrayBuffer();
          const src = await PDFDocument.load(ab);
          const pages = await merged.copyPages(src, src.getPageIndices());
          pages.forEach(p => merged.addPage(p));
          totalPages += pages.length;
        }

        setProgress('progress-wrap', 100);
        mergedBytes = await merged.save();
        document.getElementById('merge-info').textContent = `${files.length} PDFs · ${totalPages} total pages · ${formatBytes(mergedBytes.length)}`;
        document.getElementById('output').classList.add('visible');
        showToast('PDFs merged successfully!');
        trackEvent('PDF Tools', 'merge', 'merge-pdf');
      } catch (e) {
        showToast('Error merging PDFs: ' + e.message, 'error');
      }
      hideProgress('progress-wrap');
    }

    function downloadMerged() {
      if (!mergedBytes) return;
      downloadBlob(new Blob([mergedBytes], { type: 'application/pdf' }), 'merged.pdf');
    }
  </script>
</body>
</html>
